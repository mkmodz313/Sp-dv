<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Pair Code</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a1a, #0d0d0d); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #252525; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 350px; border: 1px solid #333; }
        h2 { color: #25D366; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #25D366; border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #128C7E; }
        .result { margin-top: 20px; display: none; }
        .code { font-size: 32px; letter-spacing: 4px; font-weight: bold; color: #25D366; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px dashed #25D366; }
        .error { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🤖 Bot Connector</h2>
        <p style="color:#aaa; font-size:14px;">Enter WhatsApp Number with Country Code</p>
        <input type="text" id="phone" placeholder="923001234567">
        <button onclick="getPairCode()">Get Pair Code</button>
        
        <div class="result" id="resultBox">
            <p>Your Code:</p>
            <div class="code" id="codeDisplay">....</div>
            <p style="font-size:12px; color:#888; margin-top:10px;">
                Open WhatsApp > Settings > Linked Devices<br>
                > Link with Phone Number
            </p>
        </div>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        async function getPairCode() {
            const phone = document.getElementById('phone').value;
            const resultBox = document.getElementById('resultBox');
            const codeDisplay = document.getElementById('codeDisplay');
            const errorMsg = document.getElementById('errorMsg');
            
            // Reset UI
            errorMsg.innerText = "";
            resultBox.style.display = "none";

            if (!phone || phone.length < 10) {
                errorMsg.innerText = "Please enter a valid number!";
                return;
            }

            codeDisplay.innerText = "Loading...";

            try {
                // Vercel Function ko call karega
                const res = await fetch('/api/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: phone })
                });

                const data = await res.json();

                if (data.code) {
                    resultBox.style.display = "block";
                    codeDisplay.innerText = data.code;
                } else {
                    errorMsg.innerText = data.error || "Failed to generate code.";
                }
            } catch (e) {
                errorMsg.innerText = "Server Connection Error";
            }
        }
    </script>
</body>
</html>
